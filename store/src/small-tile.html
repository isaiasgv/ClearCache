<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ClearCache — small promo tile 440×280</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 440px; height: 280px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, #1a73e8 0%, #0a4ebf 100%);
    color: #ffffff;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 112px 1fr;
    align-items: center;
    gap: 20px;
  }
  .logo-slot {
    width: 112px; height: 112px;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.28));
  }
  .logo-slot svg { width: 100%; height: 100%; display: block; }
  .copy { min-width: 0; }
  .title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.015em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 13.5px;
    opacity: 0.94;
    line-height: 1.35;
    margin-bottom: 12px;
  }
  .pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.2);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="logo-slot">
    <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="ClearCache">
      <defs>
        <radialGradient id="cc-bg-s" cx="32%" cy="28%" r="82%">
          <stop offset="0%" stop-color="#4a9cf1" />
          <stop offset="100%" stop-color="#0d5dc7" />
        </radialGradient>
      </defs>
      <circle cx="128" cy="128" r="122" fill="url(#cc-bg-s)" />
      <g transform="translate(26 26) scale(8.5)" fill="#ffffff">
        <path d="M 17.65 6.35 C 16.2 4.9 14.21 4 12 4 c -4.42 0 -7.99 3.58 -7.99 8 s 3.57 8 7.99 8 c 3.73 0 6.84 -2.55 7.73 -6 h -2.08 C 16.82 16.33 14.59 18 12 18 c -3.31 0 -6 -2.69 -6 -6 s 2.69 -6 6 -6 c 1.66 0 3.14 0.69 4.22 1.78 L 13 11 h 7 V 4 l -2.35 2.35 Z" />
      </g>
    </svg>
  </div>
  <div class="copy">
    <div class="title">Clear Cache<br />&amp; Hard Reload</div>
    <div class="tagline">One click. One site. One fresh load.</div>
    <div class="pills">
      <span class="pill">Manifest V3</span>
      <span class="pill">No telemetry</span>
      <span class="pill">GPL-3.0</span>
    </div>
  </div>
</body>
</html>
