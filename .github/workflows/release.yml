name: Release

# Triggered by:
#   - Push to main    → STABLE release (vX.Y.Z), bumps manifest, updates CHANGELOG
#   - Push to release → PRERELEASE (vX.Y.Z-rc.N), built from a temporary 4-digit
#                       manifest version (X.Y.Z.N) inside the zip; no commit-back
#   - Manual dispatch with optional bump override (respects the branch it ran on)
#
# Behavior:
#   1. Parses Conventional Commits since the last v* tag (excluding rc tags).
#   2. Determines next semver bump (major / minor / patch / none).
#   3. If no releasable commits, exits with no release.
#   4. Builds the zip, computes SHA-256, generates release notes.
#   5. STABLE: prepends notes to CHANGELOG.md, commits manifest+CHANGELOG with
#      [skip ci], tags vX.Y.Z, publishes a (non-prerelease) GitHub Release.
#      PRERELEASE: tags vX.Y.Z-rc.N, publishes a prerelease GitHub Release.

on:
  push:
    branches: [main, release]
  workflow_dispatch:
    inputs:
      bump_override:
        description: "Force a specific bump (auto = derive from commits)"
        required: false
        default: "auto"
        type: choice
        options: [auto, major, minor, patch]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Auto-version, tag, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tag analysis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git identity (github-actions bot)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect release channel
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "release" ]; then
            echo "kind=prerelease" >> "$GITHUB_OUTPUT"
            echo "Release channel: PRERELEASE (release branch)"
          else
            echo "kind=stable" >> "$GITHUB_OUTPUT"
            echo "Release channel: STABLE (main branch)"
          fi

      - name: Validate manifest.json
        run: |
          jq empty manifest.json
          for field in manifest_version name version description permissions background action icons; do
            if ! jq -e ".${field}" manifest.json > /dev/null; then
              echo "::error::manifest.json is missing required field: ${field}"
              exit 1
            fi
          done
          for size in 16 32 48 128; do
            test -f "icons/icon${size}.png" || { echo "::error::Missing icons/icon${size}.png"; exit 1; }
          done

      - name: Determine version bump from Conventional Commits
        id: bump
        run: |
          set -euo pipefail

          # Last STABLE tag only (ignore rc tags so prereleases don't reset the diff window).
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | grep -vE '\-rc\.' | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            echo "No prior stable v* tag found — treating all history as releasable."
            RANGE=""
          else
            echo "Last stable tag: $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log ${RANGE} --pretty=format:'%H%x09%s%x09%b%x1e' || true)

          BUMP="none"
          OVERRIDE="${{ inputs.bump_override }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$OVERRIDE" != "auto" ] && [ -n "$OVERRIDE" ]; then
            BUMP="$OVERRIDE"
            echo "Manual override: bump=$BUMP"
          else
            HAS_BREAKING=0; HAS_FEAT=0; HAS_PATCHABLE=0
            while IFS= read -r -d $'\x1e' record; do
              [ -z "$record" ] && continue
              SUBJECT=$(echo "$record" | awk -F'\t' '{print $2}')
              BODY=$(echo "$record" | awk -F'\t' '{print $3}')
              if echo "$SUBJECT" | grep -qE '^chore\(release\):'; then continue; fi
              if echo "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then HAS_BREAKING=1; fi
              if echo "$BODY"    | grep -qE '^BREAKING CHANGE:'; then HAS_BREAKING=1; fi
              if echo "$SUBJECT" | grep -qE '^feat(\([^)]+\))?:'; then HAS_FEAT=1; fi
              if echo "$SUBJECT" | grep -qE '^(fix|perf|refactor)(\([^)]+\))?:'; then HAS_PATCHABLE=1; fi
            done <<< "$COMMITS"

            if   [ $HAS_BREAKING -eq 1 ]; then BUMP="major"
            elif [ $HAS_FEAT     -eq 1 ]; then BUMP="minor"
            elif [ $HAS_PATCHABLE -eq 1 ]; then BUMP="patch"
            fi
          fi

          echo "Computed bump: $BUMP"
          echo "bump=$BUMP"           >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG"   >> "$GITHUB_OUTPUT"

      - name: Skip release if no releasable commits
        if: steps.bump.outputs.bump == 'none'
        run: |
          echo "::notice::No releasable commits since ${{ steps.bump.outputs.last_tag }}. Skipping release."

      - name: Compute next version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          set -euo pipefail
          CURRENT=$(jq -r '.version' manifest.json)
          IFS='.' read -r MAJ MIN PAT _BUILD <<< "$CURRENT"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
          case "${{ steps.bump.outputs.bump }}" in
            major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN+1)); PAT=0 ;;
            patch) PAT=$((PAT+1)) ;;
          esac
          BASE="${MAJ}.${MIN}.${PAT}"

          if [ "${{ steps.channel.outputs.kind }}" = "prerelease" ]; then
            # Count existing rc tags for this base version, increment.
            RC_COUNT=$(git tag --list "v${BASE}-rc.*" | wc -l | tr -d ' ')
            RC_N=$((RC_COUNT + 1))
            TAG="v${BASE}-rc.${RC_N}"
            MANIFEST_VERSION="${BASE}.${RC_N}"   # 4-digit form Chrome accepts
            ZIP_NAME="clearcache-${BASE}-rc.${RC_N}.zip"
          else
            TAG="v${BASE}"
            MANIFEST_VERSION="${BASE}"
            ZIP_NAME="clearcache-${BASE}.zip"
          fi

          echo "Channel: ${{ steps.channel.outputs.kind }}"
          echo "Current manifest version: $CURRENT"
          echo "Next semver base:         $BASE"
          echo "Tag:                      $TAG"
          echo "Zip manifest version:     $MANIFEST_VERSION"

          echo "base=$BASE"                         >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                           >> "$GITHUB_OUTPUT"
          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME"                 >> "$GITHUB_OUTPUT"

      - name: Refuse duplicate tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Aborting."
            exit 1
          fi

      - name: Stage manifest version (in working copy only — committed only on stable)
        if: steps.bump.outputs.bump != 'none'
        run: |
          set -euo pipefail
          jq --arg v "${{ steps.version.outputs.manifest_version }}" '.version = $v' manifest.json > manifest.json.tmp
          mv manifest.json.tmp manifest.json
          jq -r '.version' manifest.json

      - name: Build extension zip
        id: build
        if: steps.bump.outputs.bump != 'none'
        run: |
          set -euo pipefail
          STAGING="$(mktemp -d)"
          cp manifest.json background.js LICENSE "$STAGING/"
          cp -r icons "$STAGING/"
          if [ -d _locales ]; then cp -r _locales "$STAGING/"; fi
          (cd "$STAGING" && zip -r "$GITHUB_WORKSPACE/${{ steps.version.outputs.zip_name }}" .)
          unzip -l "${{ steps.version.outputs.zip_name }}"
          echo "zip_path=${GITHUB_WORKSPACE}/${{ steps.version.outputs.zip_name }}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256 checksum
        id: checksum
        if: steps.bump.outputs.bump != 'none'
        run: |
          ZIP="${{ steps.build.outputs.zip_path }}"
          SHA=$(sha256sum "$ZIP" | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "${SHA}  ${{ steps.version.outputs.zip_name }}" > "${ZIP}.sha256"

      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.bump != 'none'
        run: |
          set -euo pipefail
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date -u +'%Y-%m-%d')
          NOTES="$(mktemp)"

          if [ -z "$LAST_TAG" ]; then RANGE=""; else RANGE="${LAST_TAG}..HEAD"; fi

          {
            if [ "${{ steps.channel.outputs.kind }}" = "prerelease" ]; then
              echo "## ${NEW_TAG} — ${DATE} (release candidate)"
              echo ""
              echo "> Pre-release built from the \`release\` branch. Promote to stable by merging \`release\` → \`main\`, which will publish the corresponding \`v${{ steps.version.outputs.base }}\` stable release."
              echo ""
            else
              echo "## ${NEW_TAG} — ${DATE}"
              echo ""
            fi

            BREAK=$(git log ${RANGE} --pretty=format:'- %s' --grep='!:' || true)
            FEATS=$(git log ${RANGE} --pretty=format:'- %s' --grep='^feat' || true)
            FIXES=$(git log ${RANGE} --pretty=format:'- %s' --grep='^fix'  || true)
            PERFS=$(git log ${RANGE} --pretty=format:'- %s' --grep='^perf' || true)

            if [ -n "$BREAK" ]; then echo "### Breaking changes"; echo "$BREAK"; echo ""; fi
            if [ -n "$FEATS" ]; then echo "### Features";         echo "$FEATS"; echo ""; fi
            if [ -n "$FIXES" ]; then echo "### Fixes";            echo "$FIXES"; echo ""; fi
            if [ -n "$PERFS" ]; then echo "### Performance";      echo "$PERFS"; echo ""; fi

            echo "### Install"
            echo ""
            echo "Download \`${{ steps.version.outputs.zip_name }}\` below and load it as an unpacked extension."
            if [ "${{ steps.channel.outputs.kind }}" != "prerelease" ]; then
              echo " Or wait for the Chrome Web Store / Edge Add-ons listing to update."
            fi
            echo ""
            echo "**SHA-256:**"
            echo ""
            echo '```'
            echo "${{ steps.checksum.outputs.sha256 }}"
            echo '```'

            if [ -n "$LAST_TAG" ]; then
              echo ""
              echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${NEW_TAG}"
            fi
          } > "$NOTES"

          echo "path=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Prepend release notes to CHANGELOG.md (stable only)
        if: steps.bump.outputs.bump != 'none' && steps.channel.outputs.kind == 'stable'
        run: |
          set -euo pipefail
          NOTES_FILE="${{ steps.notes.outputs.path }}"

          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md <<'HDR'
          # Changelog

          All notable changes to this project are documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/),
          and versions follow [Semantic Versioning](https://semver.org/),
          driven by [Conventional Commits](https://www.conventionalcommits.org/).

          HDR
          fi

          HEADER_END=$(awk '/^# Changelog/{found=1; next} found && NF==0 && !done {print NR; done=1}' CHANGELOG.md | head -1)
          HEADER_END=${HEADER_END:-0}

          NEW_FILE="$(mktemp)"
          if [ "$HEADER_END" -gt 0 ]; then
            head -n "$HEADER_END" CHANGELOG.md > "$NEW_FILE"
            echo "" >> "$NEW_FILE"
            cat "$NOTES_FILE" >> "$NEW_FILE"
            echo "" >> "$NEW_FILE"
            tail -n +"$((HEADER_END + 1))" CHANGELOG.md >> "$NEW_FILE"
          else
            cat "$NOTES_FILE" "$NEW_FILE" > "${NEW_FILE}.tmp"
            mv "${NEW_FILE}.tmp" "$NEW_FILE"
            echo "" >> "$NEW_FILE"
            cat CHANGELOG.md >> "$NEW_FILE" 2>/dev/null || true
          fi

          mv "$NEW_FILE" CHANGELOG.md
          echo "--- CHANGELOG.md head ---"
          head -40 CHANGELOG.md

      - name: Commit version bump and changelog (stable only)
        if: steps.bump.outputs.bump != 'none' && steps.channel.outputs.kind == 'stable'
        run: |
          set -euo pipefail
          git add manifest.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ "${{ steps.channel.outputs.kind }}" = "prerelease" ]; then
            # Tag the existing release-branch commit (we did not commit any version bump back).
            git tag -a "$TAG" -m "Pre-release $TAG"
          else
            # On stable, the bump commit just landed on main as HEAD.
            git tag -a "$TAG" -m "Release $TAG"
          fi
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ steps.channel.outputs.kind == 'prerelease' }}
          files: |
            ${{ steps.build.outputs.zip_path }}
            ${{ steps.build.outputs.zip_path }}.sha256
