<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ClearCache — small promo tile 440×280</title>
<link rel="stylesheet" href="_common.css" />
<style>
  html, body { width: 440px; height: 280px; }
  body {
    background: linear-gradient(135deg, #1a73e8 0%, #0a4ebf 100%);
    color: #ffffff;
    padding: 22px 26px;
    display: grid;
    grid-template-columns: 120px 1fr;
    align-items: center;
    gap: 18px;
  }
  .logo {
    width: 120px; height: 120px;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.28));
  }
  .title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 14px;
    opacity: 0.92;
    line-height: 1.35;
    margin-bottom: 12px;
  }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <object class="logo" data="_logo.svg" type="image/svg+xml" aria-label="ClearCache logo"></object>
  <div>
    <div class="title">Clear Cache<br/>&amp; Hard Reload</div>
    <div class="tagline">One click. One site. One fresh load.</div>
    <div class="pills">
      <span class="pill">Manifest V3</span>
      <span class="pill">No telemetry</span>
      <span class="pill">GPL-3.0</span>
    </div>
  </div>
</body>
</html>
