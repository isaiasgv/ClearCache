<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ClearCache — large promo tile 1400×560</title>
<link rel="stylesheet" href="_common.css" />
<style>
  html, body { width: 1400px; height: 560px; }
  body {
    background: linear-gradient(120deg, #1a73e8 0%, #0a4ebf 55%, #083a94 100%);
    color: #ffffff;
    padding: 64px 88px;
    display: grid;
    grid-template-columns: 300px 1fr;
    align-items: center;
    gap: 64px;
    position: relative;
    overflow: hidden;
  }
  /* Decorative radial highlights */
  body::before, body::after {
    content: ""; position: absolute; pointer-events: none;
    border-radius: 50%;
    filter: blur(50px);
  }
  body::before {
    width: 420px; height: 420px;
    top: -120px; right: -80px;
    background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%);
  }
  body::after {
    width: 320px; height: 320px;
    bottom: -140px; left: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  }
  .logo {
    width: 300px; height: 300px;
    filter: drop-shadow(0 14px 36px rgba(0,0,0,0.35));
    position: relative;
  }
  .copy { position: relative; z-index: 1; }
  .eyebrow {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.02;
    margin-bottom: 18px;
  }
  .tagline {
    font-size: 26px;
    opacity: 0.92;
    margin-bottom: 28px;
    font-weight: 500;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .feature {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.14);
    font-size: 15px;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .feature .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #42e58f;
    box-shadow: 0 0 0 3px rgba(66,229,143,0.24);
  }
</style>
</head>
<body>
  <object class="logo" data="_logo.svg" type="image/svg+xml" aria-label="ClearCache logo"></object>
  <div class="copy">
    <span class="eyebrow">For Chromium browsers</span>
    <h1>Clear cache.<br/>Reload clean.</h1>
    <div class="tagline">Per-site by default. One click. Zero telemetry.</div>
    <div class="features">
      <span class="feature"><span class="dot"></span>Scoped to the current site</span>
      <span class="feature"><span class="dot"></span>Four keyboard modes</span>
      <span class="feature"><span class="dot"></span>Cache hit/miss telemetry</span>
      <span class="feature"><span class="dot"></span>Right-click context menu</span>
      <span class="feature"><span class="dot"></span>Open source · GPL-3.0</span>
    </div>
  </div>
</body>
</html>
