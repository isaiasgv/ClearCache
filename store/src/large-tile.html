<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ClearCache — large promo tile 1400×560</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1400px; height: 560px; overflow: hidden; }
  body {
    background: linear-gradient(120deg, #1a73e8 0%, #0a4ebf 55%, #083a94 100%);
    color: #ffffff;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 72px 96px;
    display: grid;
    grid-template-columns: 280px 1fr;
    align-items: center;
    gap: 72px;
    position: relative;
  }
  body::before, body::after {
    content: ""; position: absolute; pointer-events: none;
    border-radius: 50%;
    filter: blur(50px);
  }
  body::before {
    width: 420px; height: 420px;
    top: -120px; right: -80px;
    background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%);
  }
  body::after {
    width: 320px; height: 320px;
    bottom: -140px; left: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  }
  .logo-slot {
    width: 280px; height: 280px;
    filter: drop-shadow(0 14px 36px rgba(0,0,0,0.35));
    position: relative;
  }
  .logo-slot svg { width: 100%; height: 100%; display: block; }
  .copy { position: relative; z-index: 1; min-width: 0; }
  .eyebrow {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  h1 {
    font-size: 62px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.02;
    margin-bottom: 18px;
  }
  .tagline {
    font-size: 24px;
    opacity: 0.92;
    margin-bottom: 26px;
    font-weight: 500;
  }
  .features { display: flex; flex-wrap: wrap; gap: 10px; }
  .feature {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.14);
    font-size: 15px;
    font-weight: 600;
  }
  .feature .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #42e58f;
    box-shadow: 0 0 0 3px rgba(66,229,143,0.24);
  }
</style>
</head>
<body>
  <div class="logo-slot">
    <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-label="ClearCache">
      <defs>
        <radialGradient id="cc-bg-l" cx="32%" cy="28%" r="82%">
          <stop offset="0%" stop-color="#4a9cf1" />
          <stop offset="100%" stop-color="#0d5dc7" />
        </radialGradient>
      </defs>
      <circle cx="128" cy="128" r="122" fill="url(#cc-bg-l)" />
      <g transform="translate(26 26) scale(8.5)" fill="#ffffff">
        <path d="M 17.65 6.35 C 16.2 4.9 14.21 4 12 4 c -4.42 0 -7.99 3.58 -7.99 8 s 3.57 8 7.99 8 c 3.73 0 6.84 -2.55 7.73 -6 h -2.08 C 16.82 16.33 14.59 18 12 18 c -3.31 0 -6 -2.69 -6 -6 s 2.69 -6 6 -6 c 1.66 0 3.14 0.69 4.22 1.78 L 13 11 h 7 V 4 l -2.35 2.35 Z" />
      </g>
    </svg>
  </div>
  <div class="copy">
    <span class="eyebrow">For Chromium browsers</span>
    <h1>Clear cache.<br />Reload clean.</h1>
    <div class="tagline">Per-site by default. One click. Zero telemetry.</div>
    <div class="features">
      <span class="feature"><span class="dot"></span>Scoped to the current site</span>
      <span class="feature"><span class="dot"></span>Four keyboard modes</span>
      <span class="feature"><span class="dot"></span>Cache hit/miss telemetry</span>
      <span class="feature"><span class="dot"></span>Right-click context menu</span>
      <span class="feature"><span class="dot"></span>Open source · GPL-3.0</span>
    </div>
  </div>
</body>
</html>
