name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:

jobs:
  validate:
    name: Validate manifest, assets, and commit hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: manifest.json is valid JSON
        run: jq empty manifest.json

      - name: manifest.json has required fields
        run: |
          for field in manifest_version name version description permissions background action icons; do
            if ! jq -e ".${field}" manifest.json > /dev/null; then
              echo "::error::manifest.json is missing required field: ${field}"
              exit 1
            fi
          done

      - name: manifest_version is 3
        run: |
          MV=$(jq -r '.manifest_version' manifest.json)
          if [ "$MV" != "3" ]; then
            echo "::error::manifest_version must be 3, got ${MV}"
            exit 1
          fi

      - name: version is semver-shaped
        run: |
          VER=$(jq -r '.version' manifest.json)
          if ! echo "$VER" | grep -Eq '^[0-9]+(\.[0-9]+){1,3}$'; then
            echo "::error::version '${VER}' is not a valid Chrome extension version (1-4 dot-separated integers)"
            exit 1
          fi

      - name: manifest.firefox.json is valid JSON
        run: jq empty manifest.firefox.json

      - name: manifest.firefox.json has required fields
        run: |
          for field in manifest_version name version description permissions background action icons browser_specific_settings; do
            if ! jq -e ".${field}" manifest.firefox.json > /dev/null; then
              echo "::error::manifest.firefox.json is missing required field: ${field}"
              exit 1
            fi
          done

      - name: manifest.firefox.json uses background.scripts (not service_worker)
        run: |
          if jq -e '.background.service_worker' manifest.firefox.json > /dev/null 2>&1; then
            echo "::error::manifest.firefox.json must use background.scripts, not service_worker (Firefox does not support MV3 service workers)"
            exit 1
          fi
          if ! jq -e '.background.scripts' manifest.firefox.json > /dev/null; then
            echo "::error::manifest.firefox.json must declare background.scripts"
            exit 1
          fi

      - name: Chromium and Firefox manifests share the same version
        run: |
          V_CHROME=$(jq -r '.version' manifest.json)
          V_FIREFOX=$(jq -r '.version' manifest.firefox.json)
          if [ "$V_CHROME" != "$V_FIREFOX" ]; then
            echo "::error::Version mismatch: manifest.json=${V_CHROME}, manifest.firefox.json=${V_FIREFOX}"
            exit 1
          fi

      - name: All required icons exist
        run: |
          for size in 16 32 48 128; do
            test -f "icons/icon${size}.png" || { echo "::error::Missing icons/icon${size}.png"; exit 1; }
          done

      - name: background.js parses as JavaScript
        run: node --check background.js

      - name: lib/*.js parses as JavaScript
        run: |
          for f in lib/*.js; do
            [ -f "$f" ] || continue
            node --check "$f"
          done

      - name: Run unit tests (vitest)
        if: hashFiles('package.json') != ''
        run: |
          npm install --no-audit --no-fund --silent
          npm test

      - name: No AI-assistant attribution in commit history (last 50)
        run: |
          BAD=$(git log -n 50 --pretty=format:'AUTHOR:%an <%ae>%nCOMMITTER:%cn <%ce>%nMESSAGE:%B%n---' \
            | grep -iE '\b(claude|anthropic|copilot|chatgpt|cursor)\b|generated with claude|🤖 generated|co-authored-by:[[:space:]]*(claude|copilot|chatgpt|cursor|anthropic)' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Commit history contains AI-assistant attribution. See CLAUDE.md."
            echo "$BAD"
            exit 1
          fi

      - name: Conventional Commits check (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          # Validate every commit subject in the PR matches Conventional Commits.
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BAD_SUBJECTS=$(git log "${BASE_SHA}..${HEAD_SHA}" --pretty=format:'%s' \
            | grep -vE '^(feat|fix|perf|refactor|docs|test|chore|ci|build|style|revert)(\([^)]+\))?!?:[[:space:]].+' \
            | grep -v '^Merge ' || true)
          if [ -n "$BAD_SUBJECTS" ]; then
            echo "::error::These commit subjects don't follow Conventional Commits format (type[!]: description):"
            echo "$BAD_SUBJECTS"
            echo ""
            echo "Allowed types: feat, fix, perf, refactor, docs, test, chore, ci, build, style, revert"
            echo "Add ! before the colon for breaking changes (e.g. 'feat!: drop Manifest V2 support')."
            exit 1
          fi
